name: flutter_alacritty
description: >-
  Flutter terminal widget powered by an Alacritty-based Rust engine
  (flutter_rust_bridge + flutter_pty).
version: 2.0.0
repository: https://github.com/hhoao/flutter_alacritty
issue_tracker: https://github.com/hhoao/flutter_alacritty/issues
homepage: https://github.com/hhoao/flutter_alacritty

environment:
  sdk: ^3.11.5
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  rust_lib_flutter_alacritty: ^0.1.0
  flutter_pty: ^0.4.0
  freezed_annotation: ^3.0.0
  toml: ^0.18.0
  url_launcher: ^6.3.2
  desktop_drop: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.0.0
  build_runner: ^2.4.0

# Path override for the git submodule (see .gitmodules).
# Remove after rust_lib_flutter_alacritty is published on pub.dev.
dependency_overrides:
  rust_lib_flutter_alacritty:
    path: packages/rust_lib_flutter_alacritty

flutter:
  uses-material-design: true
