name: flutter_alacritty
description: "A Flutter project for Alacritty."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.12.0
  rust_lib_flutter_alacritty:
    path: rust_builder
  flutter_pty: ^0.4.0
  freezed_annotation: ^3.0.0
  toml: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
